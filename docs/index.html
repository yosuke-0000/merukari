<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>タイマー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f0f0f0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .timer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }

    /* タイマー表示 */
    .display {
      font-size: clamp(3.5rem, 15vw, 6rem);
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .display .ms {
      font-size: 0.45em;
      color: #888;
      margin-left: 0.1em;
    }

    /* ラップタイム */
    .laps {
      width: 100%;
      max-height: 150px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0.5rem;
      font-size: 0.9rem;
      color: #aaa;
      border-bottom: 1px solid #1a1a2e;
    }

    .lap-item:first-child {
      color: #fff;
    }

    /* ボタン */
    .controls {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
    }

    .btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid;
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.92);
    }

    .btn-start {
      width: 100px;
      height: 100px;
      border-color: #2ecc71;
      color: #2ecc71;
      font-size: 1rem;
    }

    .btn-start.running {
      border-color: #e74c3c;
      color: #e74c3c;
    }

    .btn-reset {
      border-color: #666;
      color: #999;
    }

    .btn-lap {
      border-color: #666;
      color: #999;
    }

    .btn[disabled] {
      opacity: 0.3;
      pointer-events: none;
    }

    /* モード切替 */
    .mode-tabs {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .mode-tab {
      background: none;
      border: none;
      color: #555;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 0.3rem 0;
      border-bottom: 2px solid transparent;
      font-weight: 500;
    }

    .mode-tab.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    /* カウントダウン入力 */
    .countdown-input {
      display: none;
      gap: 0.5rem;
      align-items: center;
      font-size: 2.5rem;
      font-weight: 200;
    }

    .countdown-input.visible {
      display: flex;
    }

    .time-input {
      width: 2.5ch;
      background: none;
      border: none;
      border-bottom: 2px solid #333;
      color: #fff;
      font-size: inherit;
      font-weight: inherit;
      text-align: center;
      font-family: inherit;
      outline: none;
    }

    .time-input:focus {
      border-bottom-color: #2ecc71;
    }

    .time-sep {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="timer-container">
    <!-- モード切替 -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="stopwatch">ストップウォッチ</button>
      <button class="mode-tab" data-mode="countdown">カウントダウン</button>
    </div>

    <!-- カウントダウン入力 -->
    <div class="countdown-input" id="countdownInput">
      <input class="time-input" id="inputH" type="number" min="0" max="99" value="00" inputmode="numeric">
      <span class="time-sep">:</span>
      <input class="time-input" id="inputM" type="number" min="0" max="59" value="05" inputmode="numeric">
      <span class="time-sep">:</span>
      <input class="time-input" id="inputS" type="number" min="0" max="59" value="00" inputmode="numeric">
    </div>

    <!-- タイマー表示 -->
    <div class="display" id="display">00:00<span class="ms">.00</span></div>

    <!-- ラップタイム -->
    <div class="laps" id="laps"></div>

    <!-- ボタン -->
    <div class="controls">
      <button class="btn btn-reset" id="resetBtn" disabled>リセット</button>
      <button class="btn btn-start" id="startBtn">スタート</button>
      <button class="btn btn-lap" id="lapBtn" disabled>ラップ</button>
    </div>
  </div>

  <script>
    // State
    let mode = 'stopwatch';
    let running = false;
    let elapsed = 0;          // ms (stopwatch)
    let remaining = 0;        // ms (countdown)
    let countdownTotal = 0;
    let lastTick = 0;
    let rafId = null;
    let laps = [];

    // Elements
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapBtn = document.getElementById('lapBtn');
    const lapsEl = document.getElementById('laps');
    const countdownInput = document.getElementById('countdownInput');
    const inputH = document.getElementById('inputH');
    const inputM = document.getElementById('inputM');
    const inputS = document.getElementById('inputS');
    const modeTabs = document.querySelectorAll('.mode-tab');

    // Format
    function fmt(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      const cs = Math.floor((ms % 1000) / 10);

      const timeStr = h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

      return `${timeStr}<span class="ms">.${String(cs).padStart(2,'0')}</span>`;
    }

    // Render
    function render() {
      const ms = mode === 'stopwatch' ? elapsed : Math.max(0, remaining);
      display.innerHTML = fmt(ms);
    }

    // Tick
    function tick(now) {
      if (!running) return;
      const delta = now - lastTick;
      lastTick = now;

      if (mode === 'stopwatch') {
        elapsed += delta;
      } else {
        remaining -= delta;
        if (remaining <= 0) {
          remaining = 0;
          stop();
          notify();
        }
      }

      render();
      if (running) rafId = requestAnimationFrame(tick);
    }

    function start() {
      if (mode === 'countdown' && remaining <= 0 && !running) {
        const h = parseInt(inputH.value) || 0;
        const m = parseInt(inputM.value) || 0;
        const s = parseInt(inputS.value) || 0;
        countdownTotal = (h * 3600 + m * 60 + s) * 1000;
        remaining = countdownTotal;
        if (remaining <= 0) return;
      }

      running = true;
      lastTick = performance.now();
      rafId = requestAnimationFrame(tick);

      startBtn.textContent = 'ストップ';
      startBtn.classList.add('running');
      resetBtn.disabled = false;
      lapBtn.disabled = mode === 'countdown';
      countdownInput.classList.remove('visible');
    }

    function stop() {
      running = false;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      startBtn.textContent = 'スタート';
      startBtn.classList.remove('running');
    }

    function reset() {
      stop();
      elapsed = 0;
      remaining = 0;
      laps = [];
      lapsEl.innerHTML = '';
      render();
      resetBtn.disabled = true;
      lapBtn.disabled = true;

      if (mode === 'countdown') {
        countdownInput.classList.add('visible');
      }
    }

    function addLap() {
      if (!running || mode !== 'stopwatch') return;
      laps.push(elapsed);
      renderLaps();
    }

    function renderLaps() {
      lapsEl.innerHTML = laps
        .map((t, i) => {
          const split = i > 0 ? t - laps[i - 1] : t;
          return `<div class="lap-item"><span>ラップ ${i + 1}</span><span>${fmtPlain(split)}</span></div>`;
        })
        .reverse()
        .join('');
    }

    function fmtPlain(ms) {
      const totalSec = Math.floor(ms / 1000);
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      const cs = Math.floor((ms % 1000) / 10);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
    }

    // Notification / vibration on countdown end
    function notify() {
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.3, 0.6].forEach(delay => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.value = 0.3;
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.15);
        });
      } catch(e) {}
    }

    // Mode switch
    function switchMode(newMode) {
      if (running) return;
      mode = newMode;
      reset();
      modeTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.mode === mode));

      if (mode === 'countdown') {
        countdownInput.classList.add('visible');
        lapBtn.style.visibility = 'hidden';
      } else {
        countdownInput.classList.remove('visible');
        lapBtn.style.visibility = 'visible';
      }

      render();
    }

    // Events
    startBtn.addEventListener('click', () => running ? stop() : start());
    resetBtn.addEventListener('click', reset);
    lapBtn.addEventListener('click', addLap);
    modeTabs.forEach(tab => tab.addEventListener('click', () => switchMode(tab.dataset.mode)));

    // Input formatting
    [inputH, inputM, inputS].forEach(input => {
      input.addEventListener('focus', () => input.select());
      input.addEventListener('blur', () => {
        input.value = String(Math.max(0, parseInt(input.value) || 0)).padStart(2, '0');
      });
    });

    // Init
    render();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
